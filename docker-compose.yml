services:
  postgres:
    image: postgres:14.23-trixie
    container_name: pettech-postgres
    environment:
      POSTGRES_PASSWORD: "pettech"
      POSTGRES_USER: "root"
      POSTGRES_DB: "pettech"
      # Bancos extras (separados por vírgula). POSTGRES_DB já cria "pettech".
      POSTGRES_MULTIPLE_DATABASES: "pettech_test"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d pettech"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
